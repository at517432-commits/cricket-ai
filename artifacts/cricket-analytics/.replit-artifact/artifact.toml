kind = "web"
previewPath = "/"
title = "Cricket Analytics Platform"
version = "1.0.0"
id = "artifacts/cricket-analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20174
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cricket-analytics run dev"

[services.env]
PORT = "20174"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cricket-analytics", "run", "build"]
publicDir = "artifacts/cricket-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
